<!doctype html>
<html lang="fr">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Blind Test - Joueur</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
	<link rel="stylesheet" href="/app.css" />
</head>
<body>
	<main class="container public-shell">
		<header class="app-header app-header-compact">
			<div class="app-brand">
				<div class="brand-mark" aria-hidden="true">
					<i class="bi bi-music-note-beamed"></i>
				</div>
				<h1 class="app-title">Blind Test</h1>
			</div>
		</header>

		<article id="joinCard" class="app-card">
			<h2><i class="bi bi-person-plus-fill"></i> Entrer comme joueur</h2>
			<p id="joinSessionMeta" class="muted">Verification de la session...</p>
			<label for="pseudo">Pseudo</label>
			<input type="text" id="pseudo" placeholder="Votre pseudo" autocomplete="nickname" />
			<button id="joinBtn"><i class="bi bi-controller"></i> Rejoindre la partie</button>
			<p id="joinError" class="error-text"></p>
		</article>

		<section id="playerUi" class="player-layout hidden">
			<article id="profileSection" class="app-card profile-card">
				<button id="profileToggleBtn" type="button" class="profile-toggle" aria-expanded="true"
					aria-controls="profileCardBody">
					<div class="title-row">
					<div>
						<p class="eyebrow">Joueur</p>
						<h2 id="playerViewTitle">Connexion a la partie</h2>
					</div>
					<div class="title-badges">
						<span id="sessionStatus" class="status-badge waiting">en attente</span>
						<span id="profileToggleIcon" class="profile-toggle-icon" aria-hidden="true">
							<i class="bi bi-chevron-up"></i>
						</span>
					</div>
					</div>
				</button>

				<div id="profileCardBody" class="profile-card-body">
					<div id="profileDisplay" class="profile-summary">
						<div class="profile-summary-main">
							<div class="profile-avatar-shell">
								<img id="profileAvatar" alt="avatar du joueur" class="hidden" />
								<div id="profileAvatarFallback" class="no-avatar">?</div>
							</div>
							<div class="profile-meta">
								<h3 id="playerPseudo" class="player-pseudo-line"></h3>
								<p id="playerDeviseText" class="player-devise-copy">Pas de devise.</p>
							</div>
						</div>
						<button id="editProfileBtn" type="button" class="secondary hidden profile-edit-btn"
							aria-label="Editer le profil">
							<i class="bi bi-pencil-square"></i>
						</button>
					</div>

					<div id="profileEditor" class="profile-editor hidden">
						<div class="avatar-wrap">
							<div class="profile-avatar-shell">
								<img id="avatarPreview" alt="aperçu de l'avatar" class="hidden" />
								<div id="avatarPreviewFallback" class="no-avatar">?</div>
							</div>
							<div>
								<label for="avatarFile">Photo</label>
								<input type="file" id="avatarFile" accept="image/*" />
							</div>
						</div>
						<label for="deviseInput">Devise</label>
						<input type="text" id="deviseInput" placeholder="Votre devise ou dicton" maxlength="200" />
						<div class="form-actions">
							<button id="saveProfileBtn" type="button" class="secondary">
								<i class="bi bi-floppy-fill"></i>
								Enregistrer le profil
							</button>
							<button id="cancelProfileBtn" type="button" class="outline">
								<i class="bi bi-x-lg"></i>
								Annuler
							</button>
						</div>
					</div>

					<p id="profileMsg" class="form-help"></p>
				</div>
			</article>

			<article id="gameSection" class="app-card">
				<h2><i class="bi bi-lightning-charge-fill"></i> Proposition</h2>
				<p id="roundHint" class="muted">Le bouton de buzz se debloque quand la partie passe en cours.</p>
				<div class="proposal-grid">
					<input type="text" id="guessTitle" placeholder="Titre" />
					<input type="text" id="guessArtist" placeholder="Artiste" />
					<input type="number" id="guessYear" placeholder="Annee" />
				</div>
				<button id="buzzBtn" class="buzz-btn" disabled><i class="bi bi-bell-fill"></i> BUZZER</button>
				<div id="buzzFeedback"></div>
			</article>

			<article id="rankingSection" class="app-card">
				<h2><i class="bi bi-trophy-fill"></i> Classement</h2>
				<p class="muted">Mon score: <strong id="myScore">0</strong> pt(s)</p>
				<table class="table-tight">
					<thead>
						<tr>
							<th>#</th>
							<th>Joueur</th>
							<th>Score</th>
						</tr>
					</thead>
					<tbody id="rankingBody"></tbody>
				</table>
				<p id="winnerBox" class="muted"></p>
			</article>
		</section>
		<button id="leaveSessionBtn" class="secondary outline hidden">
			<i class="bi bi-box-arrow-left"></i>
			Quitter la partie
		</button>

		<script type="module" src="/player.js"></script>
	</main>
</body>
</html>
