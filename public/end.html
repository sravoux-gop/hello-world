<!doctype html>
<html lang="fr">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Blind Test - Fin de partie</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
	<link rel="stylesheet" href="/app.css" />
</head>
<body>
	<main class="container public-shell end-shell">
		<header class="app-header app-header-compact">
			<div class="app-brand">
				<div class="brand-mark" aria-hidden="true">
					<i class="bi bi-music-note-beamed"></i>
				</div>
				<h1 class="app-title">Blind Test</h1>
			</div>
			<a href="/" class="header-link">
				<i class="bi bi-house-door"></i>
				Accueil
			</a>
		</header>

		<article class="app-card winner-hero">
			<p class="eyebrow">Fin de partie</p>
			<h2>And the winner is...</h2>
			<p id="winnerAnnouncement" class="winner-name">Chargement...</p>
			<p id="endSubtitle" class="muted">Recuperation du classement final.</p>
		</article>

		<section class="end-grid">
			<article class="app-card podium-card">
				<h2><i class="bi bi-award"></i> Podium</h2>
				<ol id="podiumList" class="podium-list"></ol>
			</article>

			<article class="app-card ranking-card">
				<h2><i class="bi bi-trophy-fill"></i> Classement complet</h2>
				<table class="table-tight">
					<thead>
						<tr>
							<th>#</th>
							<th>Joueur</th>
							<th>Score</th>
						</tr>
					</thead>
					<tbody id="rankingBody"></tbody>
				</table>
			</article>
		</section>

		<p id="endError" class="spectator-error hidden"></p>

		<script type="module" src="/end.js"></script>
	</main>
</body>
</html>
