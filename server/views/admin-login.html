<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blind Test - Admin Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <main class="container" style="max-width: 560px; padding-top: 2rem">
    <header class="app-header">
      <div>
        <h1 class="app-title"><i class="bi bi-shield-lock-fill"></i> Interface Admin</h1>
        <p class="app-subtitle">Authentification requise</p>
      </div>
    </header>

    <article class="app-card">
      <p>Cette interface est protegee par mot de passe serveur.</p>
      <input id="password" type="password" placeholder="Mot de passe admin" />
      <button id="loginBtn"><i class="bi bi-box-arrow-in-right"></i> Se connecter</button>
      <p id="error" class="error-text hidden"></p>
    </article>
  </main>

  <script>
    document.getElementById('loginBtn').onclick = async () => {
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';

      const response = await fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      if (!response.ok) {
        errorEl.textContent = 'Mot de passe invalide';
        errorEl.classList.remove('hidden');
        return;
      }

      location.href = '/admin';
    };
  </script>
</body>
</html>
